name: Daily Stock Check

on:
  schedule:
    - cron: '5 20 * * 1-5'  # 4:05 PM EDT (UTC-4), Mon-Fri
  workflow_dispatch:          # also allows manual run from GitHub UI

jobs:
  stock-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run stock check
        run: python scripts/stock_check.py

      - name: Commit and push
        run: |
          git config user.name "Stock Check Bot"
          git config user.email "actions@github.com"
          git add projects/stocks/
          git diff --staged --quiet || git commit -m "Stock check $(date +%Y-%m-%d)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
